# ============================================================
# Knowledge Distillation Configuration - FROM SCRATCH
# Student initialized from architecture only (no pre-trained weights)
# Requires more epochs to converge
# ============================================================

# --- Model Configuration ---
teacher_weights: "yolov8s.pt"    # Teacher: YOLOv8-Small (pre-trained)
student_weights: "yolov8n.yaml"  # Student: YOLOv8-Nano (architecture only, NO pre-trained weights)

# --- Dataset ---
data: "coco.yaml"
imgsz: 640

# --- Training Hyperparameters ---
epochs: 200                      # From scratch needs more epochs
batch_size: 16
lr0: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5                 # More warmup for from-scratch
workers: 8

# --- Distillation Hyperparameters ---
alpha: 0.5
beta: 0.0
temperature: 4.0
feature_loss_type: "mse"
normalize_features: false

# --- Memory Optimisation ---
teacher_half: true
amp: true
nbs: 64
cache: ""

# --- Output ---
project: "runs/distill"
name: "scratch_yolov8s_to_yolov8n"
save_period: 10
val_period: 5

# --- Device ---
device: ""
